function QAModal({ open, onClose, sectionLabel, questions }) {
  const [expanded, setExpanded] = useState(null);
  useEffect(() => { if (open) setExpanded(0); }, [open]);
  useEffect(() => {
    const onKey = (e) => e.key === "Escape" && onClose();
    if (open) window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white w-full max-w-3xl max-h-[85vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="bg-black text-white px-6 py-5 flex items-center justify-between sticky top-0 z-10">
          <div className="flex items-center gap-4">
            <div className="w-10 h-10 bg-[#FFC20E] flex items-center justify-center">
              <span className="text-black font-display text-lg">?</span>
            </div>
            <div>
              <div className="text-[10px] tracking-[0.3em] text-[#FFC20E] font-bold">ANTICIPATED QUESTIONS</div>
              <div className="font-display text-xl">{sectionLabel}</div>
            </div>
          </div>
          <button onClick={onClose} className="text-neutral-400 hover:text-white text-2xl leading-none">×</button>
        </div>
        <div className="px-6 py-4 bg-neutral-50 border-b border-neutral-200 text-xs italic text-neutral-600">
          Questions a lawyer-minded CEO would reasonably ask about this section. Click any question to reveal the answer and follow-up considerations.
        </div>
        <div className="divide-y divide-neutral-200">
          {questions.map((item, i) => {
            const isOpen = expanded === i;
            return (
              <div key={i} className={isOpen ? "bg-neutral-50" : "bg-white"}>
                <button onClick={() => setExpanded(isOpen ? null : i)}
                  className="w-full px-6 py-4 text-left flex items-start gap-4 hover:bg-neutral-50 transition-colors">
                  <div className="font-display text-xl text-[#FFC20E] shrink-0">Q{i + 1}</div>
                  <div className="flex-1 font-bold text-neutral-900">{item.q}</div>
                  <span className={`text-neutral-400 text-xl transition-transform ${isOpen ? "rotate-90" : ""}`}>›</span>
                </button>
                {isOpen && (
                  <div className="px-6 pb-5 ml-11">
                    <div className="text-sm text-neutral-800 leading-relaxed mb-4">{item.a}</div>
                    <div className="border-l-2 border-[#FFC20E] pl-4 py-1 bg-white">
                      <div className="text-[10px] tracking-[0.25em] font-bold text-[#FFC20E] mb-1">FOR THE FOLLOW-UP</div>
                      <div className="text-sm italic text-neutral-600">{item.follow}</div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div className="px-6 py-4 bg-black text-center">
          <div className="text-[10px] tracking-[0.3em] text-[#FFC20E] font-bold">PRIORITY WASTE · GARBAGE. MADE SIMPLE.</div>
        </div>
      </div>
    </div>
  );
}

function Field({ label, value, onChange, min, max, step = 1, suffix = "", helpText, dark = false }) {
  return (
    <div className="mb-3">
      <div className="flex items-center justify-between mb-1">
        <label className={`text-[10px] tracking-[0.15em] font-bold ${dark?"text-[#FFC20E]":"text-neutral-600"}`}>{label}</label>
        <div className="flex items-baseline gap-1">
          <span className={`font-display text-lg ${dark?"text-white":"text-black"}`}>{typeof value==="number"?value.toLocaleString():value}</span>
          <span className={`text-[10px] ${dark?"text-neutral-400":"text-neutral-500"}`}>{suffix}</span>
        </div>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={(e) => onChange(Number(e.target.value))}
        style={{ accentColor: "#FFC20E" }} />
      {helpText && <div className={`text-[9px] italic mt-0.5 ${dark?"text-neutral-400":"text-neutral-500"}`}>{helpText}</div>}
    </div>
  );
}

          <span className="block text-[#FFC20E]">Yours to make.</span>
        </h2>
      </div>
      <div className="bg-black border-l-4 border-[#FFC20E] p-5 mb-8">
        <div className="text-[10px] tracking-[0.3em] text-[#FFC20E] font-bold mb-2">THE UNDERPINNING</div>
        <div className="text-white text-sm">
          Collaboration and communication are the culture we build. EBITDA lift is the business case. Tie the two together and this becomes a no-brainer.
        </div>
      </div>
      <div className="space-y-3 mb-10">
        {asks.map((a,i) => (
          <div key={i} className="bg-neutral-50 border-l-4 border-[#FFC20E] p-5 flex items-center gap-6">
            <div className="font-display text-4xl text-[#FFC20E] w-16">{a.n}</div>
            <div className="flex-1">
              <div className="text-[10px] tracking-[0.3em] text-neutral-600 font-bold">{a.verb}</div>
              <div className="text-neutral-900 mt-1">{a.body}</div>
            </div>
          </div>
        ))}
      </div>
      <div className="text-center text-neutral-700 italic font-medium text-lg">
        The groundwork is in. The rollout is yours to commit.
      </div>
    </Section>
  );
}

// ============================================================
// MAIN
// ============================================================
function App() {
  const [activeId, setActiveId] = useState("hero");
  const [qaOpen, setQaOpen] = useState(null);

  useEffect(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => { if (entry.isIntersecting) setActiveId(entry.target.id); });
    }, { rootMargin: "-40% 0px -55% 0px", threshold: 0 });
    sections.forEach((s) => { const el = document.getElementById(s.id); if (el) observer.observe(el); });
    return () => observer.disconnect();
  }, []);

  const jump = (id) => { const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: "smooth" }); };
  const onOpenQA = (key, label) => setQaOpen({ key, label });

  return (
    <div className="bg-black">
      <Sidebar activeId={activeId} onJump={jump} />
      <main className="ml-64">
        <Hero />
        <Thesis onOpenQA={onOpenQA} />
        <Built onOpenQA={onOpenQA} />
        <WeightCase onOpenQA={onOpenQA} />
        <CSRCase onOpenQA={onOpenQA} />
        <EventsCase onOpenQA={onOpenQA} />
        <PlaybookCase onOpenQA={onOpenQA} />
        <JPCase onOpenQA={onOpenQA} />
        <WhyClaude onOpenQA={onOpenQA} />
        <ValueMatrix onOpenQA={onOpenQA} />
        <Interfaces onOpenQA={onOpenQA} />
        <Consulting onOpenQA={onOpenQA} />
        <FutureState onOpenQA={onOpenQA} />
        <IntegratedFlow onOpenQA={onOpenQA} />
        <UseCases onOpenQA={onOpenQA} />
        <MethodologyCalculator onOpenQA={onOpenQA} />
        <Ask onOpenQA={onOpenQA} />
        <footer className="bg-black border-t border-neutral-900 px-12 py-10">
          <div className="max-w-6xl mx-auto flex items-center justify-between">
            <div className="flex items-center gap-5">
              <img src={LOGO_YELLOW} alt="Priority Waste" className="h-10 w-auto" />
              <div className="border-l border-neutral-800 pl-5">
                <div className="font-display text-xl tracking-wider text-[#FFC20E]">DIGITAL TRANSFORMATION FUELED BY AI.</div>
                <div className="text-[10px] tracking-[0.3em] text-neutral-500 mt-0.5">PRIORITY WASTE · APRIL 2026 · CONFIDENTIAL · FOR V. HOYUMPA &amp; M. FRENCH</div>
              </div>
            </div>
            <div className="text-right">
              <div className="text-[10px] tracking-[0.3em] text-neutral-500">PREPARED BY</div>
              <div className="text-sm text-white">Zach Goff <span className="text-neutral-500">·</span> JP Bauer</div>
              <div className="text-[10px] text-[#FFC20E]">Marketing &amp; Digital · FP&amp;A &amp; Operations</div>
            </div>
          </div>
        </footer>
      </main>
      <QAModal open={!!qaOpen} onClose={() => setQaOpen(null)} sectionLabel={qaOpen?.label||""} questions={qaOpen?sectionQAs[qaOpen.key]||[]:[]} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
